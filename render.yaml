services:
  - type: web
    name: buy-and-go-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && cd backend/monolith && npx prisma generate && npm run build
    startCommand: cd backend/monolith && npx prisma migrate deploy && node dist/main
    healthCheckPath: /api/v1/identity/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: buy-and-go-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://buy-and-go.vercel.app
      - key: KAFKA_BROKERS
        value: "" # No Kafka on free tier - will use in-process events
      - key: REDIS_URL
        value: "" # Optional

databases:
  - name: buy-and-go-db
    plan: free
    region: oregon
    databaseName: eventos_ai
    ipAllowList: []
