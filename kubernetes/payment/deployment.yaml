apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-svc
  namespace: eventos-platform
  labels:
    app: payment-svc
    service: payment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-svc
  template:
    metadata:
      labels:
        app: payment-svc
        service: payment
    spec:
      containers:
        - name: payment-svc
          image: ghcr.io/eventos-ai/payment:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3007
          env:
            - name: PORT
              value: "3007"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: eventos-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: eventos-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: payment-svc
  namespace: eventos-platform
spec:
  selector:
    app: payment-svc
  ports:
    - port: 3007
      targetPort: 3007
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-svc
  namespace: eventos-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-svc
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
