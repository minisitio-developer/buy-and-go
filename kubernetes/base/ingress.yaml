apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eventos-ingress
  namespace: eventos-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.eventos.ai
      secretName: eventos-api-tls
  rules:
    - host: api.eventos.ai
      http:
        paths:
          - path: /v1/auth
            pathType: Prefix
            backend:
              service:
                name: identity-svc
                port:
                  number: 3001
          - path: /v1/users
            pathType: Prefix
            backend:
              service:
                name: identity-svc
                port:
                  number: 3001
          - path: /v1/events
            pathType: Prefix
            backend:
              service:
                name: event-svc
                port:
                  number: 3002
          - path: /v1/orders
            pathType: Prefix
            backend:
              service:
                name: ticket-svc
                port:
                  number: 3003
          - path: /v1/check-in
            pathType: Prefix
            backend:
              service:
                name: checkin-svc
                port:
                  number: 3004
          - path: /v1/crm
            pathType: Prefix
            backend:
              service:
                name: crm-svc
                port:
                  number: 3005
          - path: /v1/sponsor
            pathType: Prefix
            backend:
              service:
                name: sponsor-svc
                port:
                  number: 3006
          - path: /v1/payment
            pathType: Prefix
            backend:
              service:
                name: payment-svc
                port:
                  number: 3007
          - path: /v1/ai
            pathType: Prefix
            backend:
              service:
                name: ai-svc
                port:
                  number: 8000
          - path: /v1/mcp
            pathType: Prefix
            backend:
              service:
                name: ai-svc
                port:
                  number: 8000
