openapi: 3.1.0
info:
  title: EventOS AI - Ticket Service
  version: 1.0.0
  description: |
    Ticket sales and order management service for the EventOS AI platform.
    Handles ticket types, pricing lots, coupons, orders, and sales tracking.
  contact:
    name: EventOS AI Support
    email: support@eventos.ai
  license:
    name: Proprietary

servers:
  - url: http://localhost:4003
    description: Local development
  - url: https://api.eventos.ai/v1
    description: Production

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Service health check
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/events/{eventId}/ticket-types:
    get:
      operationId: listTicketTypes
      summary: List ticket types for an event
      tags:
        - Ticket Types
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, sold_out]
      responses:
        '200':
          description: List of ticket types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TicketType'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createTicketType
      summary: Create a ticket type
      tags:
        - Ticket Types
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketTypeRequest'
      responses:
        '201':
          description: Ticket type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketType'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/events/{eventId}/ticket-types/{id}:
    get:
      operationId: getTicketType
      summary: Get ticket type details
      tags:
        - Ticket Types
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ticket type details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketType'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateTicketType
      summary: Update a ticket type
      tags:
        - Ticket Types
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTicketTypeRequest'
      responses:
        '200':
          description: Ticket type updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketType'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteTicketType
      summary: Delete a ticket type
      tags:
        - Ticket Types
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Ticket type deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/events/{eventId}/lots:
    get:
      operationId: listLots
      summary: List pricing lots for an event
      tags:
        - Lots
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of lots
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Lot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createLot
      summary: Create a pricing lot
      tags:
        - Lots
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLotRequest'
      responses:
        '201':
          description: Lot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/events/{eventId}/lots/{id}:
    get:
      operationId: getLot
      summary: Get lot details
      tags:
        - Lots
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lot details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateLot
      summary: Update a lot
      tags:
        - Lots
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLotRequest'
      responses:
        '200':
          description: Lot updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteLot
      summary: Delete a lot
      tags:
        - Lots
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Lot deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/coupons:
    get:
      operationId: listCoupons
      summary: List coupons with filters
      tags:
        - Coupons
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - name: eventId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [active, expired, used, disabled]
      responses:
        '200':
          description: List of coupons
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Coupon'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createCoupon
      summary: Create a coupon
      tags:
        - Coupons
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCouponRequest'
      responses:
        '201':
          description: Coupon created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/coupons/{id}:
    get:
      operationId: getCoupon
      summary: Get coupon details
      tags:
        - Coupons
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Coupon details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateCoupon
      summary: Update a coupon
      tags:
        - Coupons
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCouponRequest'
      responses:
        '200':
          description: Coupon updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteCoupon
      summary: Delete a coupon
      tags:
        - Coupons
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Coupon deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/orders:
    get:
      operationId: listOrders
      summary: List orders with filters
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - name: eventId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, cancelled, refunded]
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createOrder
      summary: Create a new order (purchase tickets)
      tags:
        - Orders
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/orders/{id}:
    get:
      operationId: getOrder
      summary: Get order details
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/orders/{id}/confirm:
    post:
      operationId: confirmOrder
      summary: Confirm/approve an order
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentMethod:
                  type: string
                  enum: [credit_card, debit_card, pix, boleto, bank_transfer, free]
                paymentId:
                  type: string
                  description: External payment gateway ID
      responses:
        '200':
          description: Order confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/orders/{id}/refund:
    post:
      operationId: refundOrder
      summary: Refund/cancel an order
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
                notifyCustomer:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Order refunded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/ticket-types/{id}/sold:
    get:
      operationId: getTicketsSold
      summary: Get sold ticket count for a ticket type
      tags:
        - Ticket Types
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sold ticket count
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticketTypeId:
                    type: string
                    format: uuid
                  sold:
                    type: integer
                  available:
                    type: integer
                    nullable: true
                  total:
                    type: integer
                  soldPercentage:
                    type: number
                    format: float
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JSON Web Token obtained from the Identity Service

  parameters:
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized - missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
        - timestamp
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        service:
          type: string
          example: ticket
        version:
          type: string
          example: 1.0.0
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: The request contains invalid fields
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  issue:
                    type: string

    TicketType:
      type: object
      required:
        - id
        - eventId
        - name
        - price
        - currency
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        name:
          type: string
          example: VIP Pass
        description:
          type: string
          nullable: true
        price:
          type: number
          format: float
          example: 199.90
        currency:
          type: string
          default: BRL
          example: BRL
        quantity:
          type: integer
          nullable: true
          description: Total tickets available (null = unlimited)
        minPerOrder:
          type: integer
          default: 1
        maxPerOrder:
          type: integer
          default: 10
        status:
          type: string
          enum: [active, inactive, sold_out]
        saleStart:
          type: string
          format: date-time
          nullable: true
        saleEnd:
          type: string
          format: date-time
          nullable: true
        sortOrder:
          type: integer
          default: 0
        requiresDocument:
          type: boolean
          default: false
        transferable:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateTicketTypeRequest:
      type: object
      required:
        - name
        - price
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        price:
          type: number
          format: float
          minimum: 0
        currency:
          type: string
          default: BRL
        quantity:
          type: integer
          minimum: 1
          nullable: true
        minPerOrder:
          type: integer
          minimum: 1
          default: 1
        maxPerOrder:
          type: integer
          minimum: 1
          default: 10
        saleStart:
          type: string
          format: date-time
          nullable: true
        saleEnd:
          type: string
          format: date-time
          nullable: true
        sortOrder:
          type: integer
          default: 0
        requiresDocument:
          type: boolean
          default: false
        transferable:
          type: boolean
          default: true

    UpdateTicketTypeRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 1000
          nullable: true
        price:
          type: number
          format: float
          minimum: 0
        currency:
          type: string
        quantity:
          type: integer
          minimum: 1
          nullable: true
        minPerOrder:
          type: integer
          minimum: 1
        maxPerOrder:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [active, inactive]
        saleStart:
          type: string
          format: date-time
          nullable: true
        saleEnd:
          type: string
          format: date-time
          nullable: true
        sortOrder:
          type: integer
        requiresDocument:
          type: boolean
        transferable:
          type: boolean

    Lot:
      type: object
      required:
        - id
        - eventId
        - name
        - startDate
        - endDate
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        name:
          type: string
          example: Early Bird
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        priceMultiplier:
          type: number
          format: float
          default: 1.0
          description: Multiplier applied to base ticket prices
        status:
          type: string
          enum: [upcoming, active, expired]
        sortOrder:
          type: integer
          default: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateLotRequest:
      type: object
      required:
        - name
        - startDate
        - endDate
      properties:
        name:
          type: string
          maxLength: 255
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        priceMultiplier:
          type: number
          format: float
          minimum: 0
          default: 1.0
        sortOrder:
          type: integer
          default: 0

    UpdateLotRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        priceMultiplier:
          type: number
          format: float
          minimum: 0
        sortOrder:
          type: integer

    Coupon:
      type: object
      required:
        - id
        - code
        - discountType
        - discountValue
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: WELCOME20
        description:
          type: string
          nullable: true
        discountType:
          type: string
          enum: [percentage, fixed]
        discountValue:
          type: number
          format: float
          example: 20.0
        maxUses:
          type: integer
          nullable: true
        usedCount:
          type: integer
          default: 0
        minOrderAmount:
          type: number
          format: float
          nullable: true
        maxDiscountAmount:
          type: number
          format: float
          nullable: true
        eventId:
          type: string
          format: uuid
          nullable: true
          description: Restrict coupon to a specific event
        status:
          type: string
          enum: [active, expired, used, disabled]
        validFrom:
          type: string
          format: date-time
        validUntil:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCouponRequest:
      type: object
      required:
        - code
        - discountType
        - discountValue
        - validFrom
        - validUntil
      properties:
        code:
          type: string
          pattern: '^[A-Z0-9_-]{3,30}$'
        description:
          type: string
          maxLength: 500
        discountType:
          type: string
          enum: [percentage, fixed]
        discountValue:
          type: number
          format: float
          minimum: 0
        maxUses:
          type: integer
          minimum: 1
          nullable: true
        minOrderAmount:
          type: number
          format: float
          minimum: 0
          nullable: true
        maxDiscountAmount:
          type: number
